# Retrives information about a specific artist
get:
  tags:
    - marketplace
  summary: Retrives information about a specific artist information
  description: >-
    The GET operative works to get a specific artwork in marketplace
  operationId: getProfile
  parameters:
    - $ref: './ArtCertAPI.yaml#/components/parameters/artistIDpath'
  responses:
    "200":
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "./Marketplace.components.yaml#/components/schemas/profile"
        application/xml:
          schema:
            $ref: "./Marketplace.components.yaml#/components/schemas/profile"
    '400':
      $ref: './ArtCertAPI.yaml#/components/responses/400'
    '401':
      $ref: './ArtCertAPI.yaml#/components/responses/401'
    '403':
      $ref: './ArtCertAPI.yaml#/components/responses/403'
    '404':
      $ref: './ArtCertAPI.yaml#/components/responses/404'
    '405':
      $ref: './ArtCertAPI.yaml#/components/responses/405'
    '406':
      $ref: './ArtCertAPI.yaml#/components/responses/406'
    '500':
      $ref: './ArtCertAPI.yaml#/components/responses/500'
    '501':
      $ref: './ArtCertAPI.yaml#/components/responses/501'
    '503':
      $ref: './ArtCertAPI.yaml#/components/responses/503'
    '429':
      $ref: './ArtCertAPI.yaml#/components/responses/429'
    default:
      $ref: './ArtCertAPI.yaml#/components/responses/Error'
  security:
    - bearerAuth: []
  x-swagger-router-controller: Marketplace