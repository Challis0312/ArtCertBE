# Retrives information about a specific artwork
get:
  tags:
    - marketplace
  summary: Retrives information about a specific artwork in marketplace (show artwork profile)
  description: >-
    The GET operative works to get a specific artwork in marketplace
  operationId: getArtworkProfileInMarket
  parameters:
    - $ref: './ArtCertAPI.yaml#/components/parameters/artworkIDpath'
  responses:
    "200":
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "./Marketplace.components.yaml#/components/schemas/marketplaceAll"
        application/xml:
          schema:
            $ref: "./Marketplace.components.yaml#/components/schemas/marketplaceAll"
    '400':
      $ref: './ArtCertAPI.yaml#/components/responses/400'
    '401':
      $ref: './ArtCertAPI.yaml#/components/responses/401'
    '403':
      $ref: './ArtCertAPI.yaml#/components/responses/403'
    '404':
      $ref: './ArtCertAPI.yaml#/components/responses/404'
    '405':
      $ref: './ArtCertAPI.yaml#/components/responses/405'
    '406':
      $ref: './ArtCertAPI.yaml#/components/responses/406'
    '500':
      $ref: './ArtCertAPI.yaml#/components/responses/500'
    '501':
      $ref: './ArtCertAPI.yaml#/components/responses/501'
    '503':
      $ref: './ArtCertAPI.yaml#/components/responses/503'
    '429':
      $ref: './ArtCertAPI.yaml#/components/responses/429'
    default:
      $ref: './ArtCertAPI.yaml#/components/responses/Error'
  security:
    - bearerAuth: []
  x-swagger-router-controller: Marketplace

# Update artwork listing based on artworkID  
put:
  tags:
    - marketplace
  summary: update the info(such as price) of a specific artwork entity from marketplace
  description: >-
    The PUT operative works to update an artwork in marketplace
  operationId: updateArtworkInMarket
  parameters:
    - $ref: './ArtCertAPI.yaml#/components/parameters/artworkIDpath'
  requestBody:
    $ref: './Marketplace.components.yaml#/components/requestBodies/artworkPut'
  responses:
    "202":
      description: Successfully updated artwork in marketplace
      # content:
      #   application/json:
      #     schema:
      #       $ref: './Marketplace.components.yaml#/components/schemas/marketplaceSingle'
      #   application/xml:
      #     schema:
      #       $ref: './Marketplace.components.yaml#/components/schemas/marketplaceSingle'
    '400':
      $ref: './ArtCertAPI.yaml#/components/responses/400'
    '401':
      $ref: './ArtCertAPI.yaml#/components/responses/401'
    '403':
      $ref: './ArtCertAPI.yaml#/components/responses/403'
    '404':
      $ref: './ArtCertAPI.yaml#/components/responses/404'
    '405':
      $ref: './ArtCertAPI.yaml#/components/responses/405'
    '406':
      $ref: './ArtCertAPI.yaml#/components/responses/406'
    '500':
      $ref: './ArtCertAPI.yaml#/components/responses/500'
    '501':
      $ref: './ArtCertAPI.yaml#/components/responses/501'
    '503':
      $ref: './ArtCertAPI.yaml#/components/responses/503'
    '429':
      $ref: './ArtCertAPI.yaml#/components/responses/429'
