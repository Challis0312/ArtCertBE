# Returns a array of role that the user has
get:
  tags:
    - role
  summary: Get current user's roles
  description: >-
    Returns an array of roles assigned to the authenticated user (identified by sub).
  operationId: getUserRole
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [userRole]
            properties:
              userRole:
                type: array
                items: 
                  type: string
            example: 
              userRole: ['artist', 'collector']
        application/xml:
          schema:
            type: object
            additionalProperties: false
            required: [userRole]
            properties:
              userRole:
                type: array
                items: 
                  type: string
            example: 
              userRole: ['artist', 'collector']
    '400':
      $ref: './ArtCertAPI.yaml#/components/responses/400'
    '401':
      $ref: './ArtCertAPI.yaml#/components/responses/401'
    '403':
      $ref: './ArtCertAPI.yaml#/components/responses/403'
    '404':
      $ref: './ArtCertAPI.yaml#/components/responses/404'
    '405':
      $ref: './ArtCertAPI.yaml#/components/responses/405'
    '406':
      $ref: './ArtCertAPI.yaml#/components/responses/406'
    '500':
      $ref: './ArtCertAPI.yaml#/components/responses/500'
    '501':
      $ref: './ArtCertAPI.yaml#/components/responses/501'
    '503':
      $ref: './ArtCertAPI.yaml#/components/responses/503'
    '429':
      $ref: './ArtCertAPI.yaml#/components/responses/429'
    default:
      $ref: './ArtCertAPI.yaml#/components/responses/Error'
  security:
    - bearerAuth: []
  x-swagger-router-controller: User